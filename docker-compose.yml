version: '3.8'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: armour_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: armour_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: armour_db
      DB_USER: postgres
      DB_PASSWORD: armour_password
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
